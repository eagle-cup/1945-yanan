<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17130f">
  <title>1945延安｜历史现场</title>
  <link rel="stylesheet" href="assets/css/common.css">
</head>
<body class="home-shell">
  <main class="home-cover" id="home-cover">
    <div class="cover-grain" aria-hidden="true"></div>
    <img class="brand-mark" src="assets/images/logo.png" alt="1945延安项目标志">
    <p class="eyebrow">YAN'AN · 1945</p>
    <h1 class="home-title">延安<br><span>1945</span></h1>
    <p class="home-subtitle">七处历史现场，沿着一条时间线重新进入那个春夏。</p>
    <button class="cover-command" id="open-map" type="button">
      <span>展开历史地图</span>
      <span class="command-icon" aria-hidden="true">↓</span>
    </button>
    <p class="cover-note">点击地点，开始一段一分钟的历史行走</p>
  </main>

  <section class="map-drawer" id="history-map" aria-hidden="true" aria-labelledby="map-title">
    <header class="map-toolbar">
      <button class="icon-control" id="close-map" type="button" aria-label="返回项目封面" title="返回封面"></button>
      <div class="map-toolbar-title">
        <p>1945 · 延安</p>
        <h2 id="map-title">七处历史现场</h2>
      </div>
      <a class="icon-control" href="quiz/" aria-label="进入知识挑战" title="知识挑战"></a>
    </header>
    <p class="map-intro">点按地标，循着时间路线抵达现场</p>
    <section class="map-board" id="map-board" aria-label="1945延安七个历史地点示意图">
      <svg class="map-route" aria-hidden="true" viewBox="0 0 100 100" preserveAspectRatio="none"><path id="map-route-path"></path></svg>
      <div id="map-markers"></div>
      <span class="map-legend">历史氛围示意图 · 非比例测绘</span>
    </section>
    <div class="map-foot-tools">
      <button class="map-tool-text" id="map-reset" type="button">重看路线</button>
      <a class="map-tool-text" href="quiz/">知识挑战 <span id="quiz-count"></span></a>
    </div>
  </section>
  <script src="assets/js/site-data.js"></script>
  <script src="assets/js/site.js"></script>
</body>
</html>
